  const hasVoice = appData.settings.voiceEnabled;
  c.innerHTML = `<div>
    <!-- 顶部导航 -->
    <div class="flex justify-between items-center mb-8">
      <button class="btn btn-ghost btn-sm" onclick="backToPracticeSetup()" style="padding:4px 8px;font-size:18px" title="返回">🏠</button>
      <span style="font-size:14px;font-weight:700;color:var(--text)">${cur} / ${total}</span>
      <button style="background:none;border:none;font-size:24px;cursor:pointer;padding:8px 12px;line-height:1;min-width:44px;min-height:44px" onclick="toggleStarCurrent()">${starIcon}</button>
    </div>

    <!-- 密度 + 工具 同行 -->
    <div class="flex items-center gap-8 mb-8">
      <div class="segmented" id="densityCtrl" style="flex:0">
        <button class="seg${density === 'low' ? ' active' : ''}" data-v="low" onclick="changeDensity('low', this)" style="padding:5px 10px;min-height:32px;font-size:13px">低</button>
        <button class="seg${density === 'high' ? ' active' : ''}" data-v="high" onclick="changeDensity('high', this)" style="padding:5px 10px;min-height:32px;font-size:13px">高</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="editCurrentCardBlanks()" style="padding:6px 8px;font-size:var(--font-size)" title="手动挖空">🐑</button>
	      <button class="btn btn-ghost btn-sm" onclick="regenerateCurrentBlanks()" style="padding:6px 8px;font-size:var(--font-size)" title="换一批空">🔄</button>
      <div class="flex gap-4" style="margin-left:auto">
        <button class="btn btn-ghost btn-sm" onclick="toggleRevealCurrent()" style="padding:6px 8px;font-size:var(--font-size)" title="显示原文">💡</button>
        ${hasKj ? `<button class="btn btn-ghost btn-sm" onclick="toggleKoujuePanel()" style="padding:6px 8px;font-size:var(--font-size);color:var(--primary)" title="口诀">🧠</button>` : ''}
        ${hasVoice ? `<button class="btn btn-ghost btn-sm" onclick="speakCard()" style="padding:6px 8px;font-size:var(--font-size)" title="朗读">🔊</button>` : ''}
      </div>
    </div>

    <!-- 题目卡片 -->
    <div class="practice-card"><div class="card-text" id="cardText">${textHtml}</div></div>

    <!-- 口诀面板 -->
    ${hasKj ? `<div class="kj-panel${kjState > 0 ? ' show' : ''}" id="kjPanel" style="padding:10px 14px;margin-bottom:10px">
      <div class="kj-keywords" onclick="expandKoujue()" style="cursor:pointer">${renderKjKeywords(card.koujue)}</div>
      <div class="kj-full${kjState > 1 ? ' show' : ''}" onclick="collapseKoujue()" style="cursor:pointer">${renderKjFull(card.koujue)}</div>
      <div class="kj-tap-hint">${kjState === 0 ? '' : kjState === 1 ? '👆 点关键字查看完整含义' : ''}</div>
    </div>` : ''}

    <!-- 底部导航 -->
    <div class="flex gap-8" style="margin-top:20px">
      <button class="btn flex-1" onclick="prevCard()"${st.index === 0 ? ' disabled style="opacity:.3"' : ''} style="background:var(--primary-soft);color:var(--primary);border:none;font-weight:600">← 上一题</button>
      <button class="btn flex-1" id="btnNextPractice" onclick="nextCard()" style="background:var(--primary-soft);color:var(--primary);border:none;font-weight:600">${cur === total ? '✓ 完成' : '下一题 →'}</button>
    </div>
  </div>`;

  // 点击答题卡左右区域切换题目
  const pc = c.querySelector('.practice-card');
  if (pc) {
    pc.addEventListener('click', e => {
      const rect = pc.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const w = rect.width;
      // 点左1/6区域 → 上一题
      if (x < w / 6 && st.index > 0) {
        saveCurrentAnswers();
        st.index--;
        renderPracticeCard();
      }
      // 点右1/6区域 → 下一题
      else if (x > w * 5 / 6 && st.index < st.total - 1) {
        saveCurrentAnswers();
        st.index++;
        renderPracticeCard();
      }
    });
  }

  setTimeout(() => {
    const fi = document.querySelector('#cardText .blank-input');
    if (fi && !revealed) fi.focus();
  }, 200);

  // 双击空白显示答案（第一下聚焦不算）
  const cardText = c.querySelector('#cardText');
  if (cardText && !revealed) {
    const taps = new Map(); // inp → { count, lastTime }
    cardText.querySelectorAll('.blank-input').forEach(inp => {
      inp.addEventListener('pointerdown', e => {
        const now = Date.now();
        const t = taps.get(inp) || { count: 0, lastTime: 0 };
        if (now - t.lastTime > 800) t.count = 0;
        // 第一下只聚焦不算，从第二下开始计数
        if (document.activeElement !== inp && !inp.classList.contains('peeked')) {
          t.lastTime = now;
          taps.set(inp, t);
          return;
        }
        t.count++;
        t.lastTime = now;
        if (inp.classList.contains('peeked')) {
          inp.value = '';
          inp.classList.remove('peeked');
          t.count = 0;
        } else if (t.count >= 2) {
          inp.value = inp.dataset.ans || '';
          inp.classList.add('peeked');
          t.count = 0;
        }
        taps.set(inp, t);
      });
    });
  }
}

function renderCardWithBlanks(card, revealed, hideQ) {
  const q = card.question.trim();
  const a = card.answer.trim();
  const text = card.fullText || q + '\n' + a;
  const answerStart = q.length + 1; // +1 for \n

  // 题目：点击可隐藏/显示
  let h = '';
  if (hideQ) {
    h += `<div style="margin-bottom:10px;padding:8px;background:var(--bg-input);border-radius:6px;text-align:center;font-size:12px;color:var(--text-tertiary);cursor:pointer" onclick="event.stopPropagation();toggleQuestion()">题目已隐藏，点击显示</div>`;
  } else {
    h += `<div style="margin-bottom:10px;line-height:1.6;cursor:pointer" onclick="event.stopPropagation();toggleQuestion()" title="点击隐藏题目">${escNl(q)}</div>`;
  }

  // 分隔 + 答案区
  if (!a) return h;
  h += `<div style="font-size:11px;color:var(--text-tertiary);margin-bottom:6px;font-weight:600;letter-spacing:.5px">── 填空区 ──</div>`;

  // 解决重叠空：分组后每组选一个
  const blanks = resolveBlanks(card);
  if (!blanks.length) {
    h += `<div style="line-height:1.9">${escNl(a)}</div>`;
    return h;
  }

  // 渲染答案，带挖空
  let ah = '', le = answerStart;
  for (let i = 0; i < blanks.length; i++) {
    const b = blanks[i];
    const saved = (practiceState.answers[card.id] || {})[i] || '';
    ah += escNl(text.substring(le, b.start));
    if (revealed) {
      ah += `<span class="revealed-text">${escNl(b.text)}</span>`;
    } else {
      ah += `<input type="text" class="blank-input" data-cid="${card.id}" data-bidx="${i}" data-ans="${escapeHtml(b.text)}" value="${escapeHtml(saved)}" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" oncontextmenu="return false" onblur="autoCheckIfDone()">`;
    }
    le = b.end;
  }
  ah += escNl(text.substring(le));
  h += `<div style="line-height:1.9">${ah}</div>`;
  return h;
}

// 解决重叠空：分组后每组选一个（_blankRound 控制轮换）
function resolveBlanks(card) {
  const all = card.blanks || [];
  if (!all.length) return [];
  const sorted = [...all].sort((a, b) => a.start - b.start);
  const groups = [];
  for (const b of sorted) {
    let added = false;
    for (const g of groups) {
      if (g.some(gb => gb.start < b.end && b.start < gb.end)) {
        g.push(b); added = true; break;
      }
    }
    if (!added) groups.push([b]);
  }
  const round = card._blankRound || 0;
  let resolved = groups.map(g => g[round % g.length]);
  return resolved;
}

function saveCurrentAnswers() {
  const inputs = document.querySelectorAll('#cardText .blank-input');
  const ans = {};
  inputs.forEach(inp => {
    const cid = inp.dataset.cid, bidx = parseInt(inp.dataset.bidx);
    if (!ans[cid]) ans[cid] = {};
    ans[cid][bidx] = inp.value.trim();
  });
  for (const [cid, blanks] of Object.entries(ans)) {
    if (!practiceState.answers[cid]) practiceState.answers[cid] = {};
    Object.assign(practiceState.answers[cid], blanks);
  }
}

function nextCard() { saveCurrentAnswers(); practiceState.index++; renderPracticeCard(); }
function prevCard() { saveCurrentAnswers(); practiceState.index--; renderPracticeCard(); }

function checkMyAnswers() {
  saveCurrentAnswers();
  const card = practiceState.cards[practiceState.index];
  if (!card || practiceState.revealed.has(card.id)) return;
  // 检查当前显示的所有输入框是否都已填写
  const inputs = document.querySelectorAll('#cardText .blank-input');
  for (const inp of inputs) {
    if (!inp.value.trim()) return;
  }
  if (!inputs.length) return;
  applyCheckToInputs(card);
}

function autoCheckIfDone() {
  saveCurrentAnswers();
  const card = practiceState.cards[practiceState.index];
  if (!card || practiceState.revealed.has(card.id)) return;
  const inputs = document.querySelectorAll('#cardText .blank-input');
  for (const inp of inputs) {
    if (!inp.value.trim()) return;
  }
  if (inputs.length) applyCheckToInputs(card);
}

function applyCheckToInputs(card) {
  const inputs = document.querySelectorAll('#cardText .blank-input');
  let hasWrong = false;
  inputs.forEach(inp => {
    const userAns = inp.value.trim();
    const correctAns = (inp.dataset.ans || '').trim();
    inp.classList.remove('correct', 'wrong');
    if (fuzzyMatch(userAns, correctAns)) {
      inp.classList.add('correct');
    } else {
      inp.classList.add('wrong');
      hasWrong = true;
    }
  });
  // 有错则收集整题到错题本（不去重，用户手动管理）
  if (hasWrong) {
    if (!appData.wrongBooks) appData.wrongBooks = {};
    if (!appData.wrongBooks[practiceState.bankId]) appData.wrongBooks[practiceState.bankId] = [];
    if (!appData.wrongBooks[practiceState.bankId].includes(card.id)) {
      appData.wrongBooks[practiceState.bankId].push(card.id);
    }
    saveData(appData);
  }
}

function toggleRevealCurrent() {
  saveCurrentAnswers();
  const card = practiceState.cards[practiceState.index];
  practiceState.revealed.has(card.id) ? practiceState.revealed.delete(card.id) : practiceState.revealed.add(card.id);
  renderPracticeCard();
}

function toggleStarCurrent() {
  const card = practiceState.cards[practiceState.index];
  card.starred = !card.starred;
  const bank = appData.banks[practiceState.bankId];
  if (bank) { const c = bank.cards.find(x => x.id === card.id); if (c) c.starred = card.starred; }
  saveData(appData);
  renderPracticeCard();
}

function toggleQuestion() {
  const card = practiceState.cards[practiceState.index];
  if (practiceState.questionHidden.has(card.id)) practiceState.questionHidden.delete(card.id);
  else practiceState.questionHidden.add(card.id);
  renderPracticeCard();
}

function toggleKoujuePanel() {
  const card = practiceState.cards[practiceState.index];
  const cur = practiceState.koujueExpanded[card.id] || 0;
  practiceState.koujueExpanded[card.id] = cur >= 2 ? 0 : cur + 1;
  renderPracticeCard();
}

function expandKoujue() {
  const card = practiceState.cards[practiceState.index];
  practiceState.koujueExpanded[card.id] = 2;
  renderPracticeCard();
}

function collapseKoujue() {
  const card = practiceState.cards[practiceState.index];
  practiceState.koujueExpanded[card.id] = 1;
  renderPracticeCard();
}

function renderKjKeywords(kj) {
  const parsed = parseKoujue(kj);
  if (!parsed.length) return escapeHtml(kj);
  return parsed.map(p => `<span>${escapeHtml(p.char)}</span>`).join(' ');
}

function renderKjFull(kj) {
  const parsed = parseKoujue(kj);
  if (!parsed.length) return escapeHtml(kj);
  return parsed.map(p => `<span class="kj-char">${escapeHtml(p.char)}</span><span class="kj-desc">（${escapeHtml(p.desc)}）</span>`).join(' ');
}

function regenerateCurrentBlanks() {
  saveCurrentAnswers();
  const card = practiceState.cards[practiceState.index];
  // 有重叠空 → 切换替代空；否则 → 按当前密度重新生成
  if (card._manualBlanks || hasOverlappingBlanks(card)) {
    card._blankRound = (card._blankRound || 0) + 1;
  } else {
    Object.assign(card, regenerateBlanks(card, appData.settings.density || 'low'));
    delete card._manualBlanks;
  }
  delete practiceState.answers[card.id];
  practiceState.revealed.delete(card.id);
  const bank = appData.banks[practiceState.bankId];
  if (bank) { const c = bank.cards.find(x => x.id === card.id); if (c) { c.blanks = card.blanks; c.fullText = card.fullText; if (!card._manualBlanks) delete c._manualBlanks; } }
  saveData(appData);
  renderPracticeCard();
  showToast('已重新挖空');
}

function editCurrentCardBlanks() {
  saveCurrentAnswers();
  const card = practiceState.cards[practiceState.index];
  if (!card) return;
  const copy = JSON.parse(JSON.stringify(card));
  delete copy._blankRound;
  const saved = {};
  const q = (copy.question || "").trim();
  const answerStart = q.length + 1;
  for (const b of (copy.blanks || [])) {
    for (let j = b.start - answerStart; j < b.end - answerStart; j++) saved[j] = true;
  }
  copy._charSelected = {};
  copy._savedChars = saved;
  copy._autoBlanks = null;
  previewData = { name: "单题编辑", cards: [copy], mode: "manual", _singleCardEdit: true, _cardIdx: practiceState.index };
  showImportPreview("单题编辑", [copy]);
  const origConfirm = confirmImport;
  confirmImport._origSingleCard = origConfirm;
  confirmImport = function() {
    if (!previewData || !previewData._singleCardEdit) { confirmImport = confirmImport._origSingleCard || origConfirm; return confirmImport(); }
    const edited = previewData.cards[0];
    delete edited._charSelected; delete edited._savedChars; delete edited._autoBlanks;
    practiceState.cards[previewData._cardIdx] = edited;
    practiceState.revealed.delete(edited.id);
    delete practiceState.answers[edited.id];
    const bank = appData.banks[practiceState.bankId];
    if (bank) {
      const c = bank.cards.find(x => x.id === edited.id);
      if (c) { c.blanks = edited.blanks; c.fullText = edited.fullText; c._manualBlanks = edited._manualBlanks; }
      saveData(appData);
    }
    previewData = null; const m = $('previewModal'); if (m) m.remove();
    confirmImport = origConfirm;
    renderPracticeCard();
  };
}

function hasOverlappingBlanks(card) {
  const all = card.blanks || [];
  for (let i = 0; i < all.length; i++) {
    for (let j = i + 1; j < all.length; j++) {
      if (all[i].start < all[j].end && all[j].start < all[i].end) return true;
    }
  }
  return false;
}

function changeDensity(density, el) {
  saveSetting('density', density);
  document.querySelectorAll('#densityCtrl .seg').forEach(s => s.classList.remove('active'));
  if (el) el.classList.add('active');
  if (!practiceState || !practiceState.cards) return;
  saveCurrentAnswers();
  let count = 0;
  for (const card of practiceState.cards) {
    if (card._manualBlanks) continue;
    Object.assign(card, regenerateBlanks(card, density));
    delete card._manualBlanks;
    delete practiceState.answers[card.id];
    practiceState.revealed.delete(card.id);
    count++;
  }
  // 同步到题库
  const bank = appData.banks[practiceState.bankId];
  if (bank) {
    for (const card of practiceState.cards) {
      if (card._manualBlanks) continue;
      const c = bank.cards.find(x => x.id === card.id);
      if (c) { c.blanks = card.blanks; c.fullText = card.fullText; delete c._manualBlanks; }
    }
    saveData(appData);
  }
  renderPracticeCard();
}

function speakCard() {
  const ss = window.speechSynthesis;
  if (!ss) { showToast('浏览器不支持语音朗读'); return; }
  const card = practiceState.cards[practiceState.index];
  if (!card) return;
  // 切到不同卡片 → 取消旧的，重新开始
  if (practiceState._speakingCardId && practiceState._speakingCardId !== card.id) {
    ss.cancel(); practiceState._speakingCardId = null;
  }
  // 暂停 → 继续
  if (ss.speaking && ss.paused) { ss.resume(); return; }
  // 朗读中 → 暂停
  if (ss.speaking) { ss.pause(); return; }
  // 开始朗读
  practiceState._speakingCardId = card.id;
  doSpeakCard();
}

function doSpeakCard() {
  const card = practiceState.cards[practiceState.index];
  if (!card) return;
  const ss = window.speechSynthesis;
  ss.cancel();
  const u = new SpeechSynthesisUtterance(card.fullText || card.question + card.answer);
  u.lang = 'zh-CN'; u.rate = appData.settings.voiceRate || 0.9; u.pitch = appData.settings.voicePitch || 1.0;
  const voiceName = appData.settings.voiceName;
  if (voiceName) {
    const voices = ss.getVoices();
    const picked = voices.find(v => v.name === voiceName);
    if (picked) u.voice = picked;
  }
  if (!u.voice) {
    const zh = ss.getVoices().find(v => v.lang.startsWith('zh'));
    if (zh) u.voice = zh;
  }
  // 朗读结束后的行为
  const readMode = appData.settings.readMode || 'once';
  u.onend = () => {
    if (readMode === 'loop') {
      // 循环读同一题
      setTimeout(() => doSpeakCard(), 500);
    } else if (readMode === 'three-times') {
      practiceState._readCount = (practiceState._readCount || 0) + 1;
      if (practiceState._readCount < 3) {
        setTimeout(() => doSpeakCard(), 500);
      } else {
        practiceState._readCount = 0;
        // 3遍读完，自动下一题
        if (practiceState.index < practiceState.total - 1) {
          setTimeout(() => { nextCard(); setTimeout(() => doSpeakCard(), 300); }, 500);
        }
      }
    } else if (readMode === 'auto-next') {
      // 自动下一题
      if (practiceState.index < practiceState.total - 1) {
        setTimeout(() => { nextCard(); setTimeout(() => doSpeakCard(), 300); }, 500);
      }
    }
    // 'once' mode: do nothing
  };
  practiceState._readCount = 0;
  ss.speak(u);
}

// ==================== 做题结果 ====================
function showPracticeResult() {
  const st = practiceState;
  const total = st.total;
  const bank = appData.banks[st.bankId];

  // 更新顺序进度
  if (st.mode === 'sequential') {
    const pos = getSeqProgress(st.bankId);
    appData.seqProgress[st.bankId] = Math.min(pos + total, bank?.cards.length || 0);
  }
  // 更新随机不重复的已完成集
  if (st.mode === 'random-norepeat') {
    if (!appData.doneSets) appData.doneSets = {};
    if (!appData.doneSets[st.bankId]) appData.doneSets[st.bankId] = [];
    for (const card of st.cards) {
      if (!appData.doneSets[st.bankId].includes(card.id)) appData.doneSets[st.bankId].push(card.id);
    }
  }

  // 更新卡片统计
  if (bank) {
    for (const card of st.cards) {
      const orig = bank.cards.find(x => x.id === card.id);
      if (orig) {
        orig.lastPracticed = Date.now(); orig.starred = card.starred;
        orig.blanks = card.blanks; orig.fullText = card.fullText;
      }
    }
  }
  saveData(appData);

  // 练习轮次计数
  appData.roundCount = (appData.roundCount || 0) + 1;
  saveData(appData);

  const rc = $('practiceResult');
  rc.style.display = 'block';
  rc.innerHTML = `<div class="card" style="text-align:center;padding:24px 20px">
    <div style="font-size:48px;margin-bottom:8px">✅</div>
    <div style="font-size:20px;font-weight:800;margin-bottom:4px">本轮完成</div>
    <div class="text-sm text-secondary">共 ${total} 题 · ${escapeHtml(st.bankName)}</div>
    <div class="flex gap-8 flex-wrap justify-center mt-16">
      <button class="btn btn-primary btn-sm" onclick="retrySameSettings()">▶ 再来一轮</button>
      <button class="btn btn-ghost btn-sm" onclick="backToPracticeSetup()">🔄 重新设置</button>
    </div>
    <div class="text-center mt-12">
      <span style="font-size:12px;color:var(--text-tertiary);cursor:pointer;text-decoration:underline" onclick="copyBackup()">💾 复制备份码保存</span>
    </div>
  </div>`;

  // 每5轮提醒
  if (appData.roundCount % 5 === 0) {
    setTimeout(() => showToast('📋 已练习 ' + appData.roundCount + ' 轮，记得备份数据哦'), 1500);
  }
}

function retrySameSettings() {
  const bankId = practiceState.bankId;
  const bank = appData.banks[bankId];
  if (!bank) return;
  const count = practiceState.total;
  let selected;
  if (practiceState.mode === 'sequential') {
    const pos = getSeqProgress(bankId);
    if (pos >= bank.cards.length) {
      appData.seqProgress[bankId] = 0;
      saveData(appData);
      selected = [...bank.cards.slice(0, count)];
    } else {
      selected = [...bank.cards.slice(pos, Math.min(pos + count, bank.cards.length))];
    }
  } else {
    selected = shuffle(bank.cards).slice(0, count);
  }
  const qh = new Set();
  if (hideQuestionStart) { for (const c of selected) qh.add(c.id); }
  practiceState = { ...practiceState, cards: selected, index: 0, answers: {}, revealed: new Set(), questionHidden: qh, koujueExpanded: {}, total: selected.length };
  $('practiceResult').style.display = 'none';
  $('practiceActive').style.display = 'block';
  renderPracticeCard();
}

function backToPracticeSetup() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  practiceState = null;
  $('practiceResult').style.display = 'none';
  $('practiceActive').style.display = 'none';
  renderPracticeSetup();
}

// ==================== 浏览模式（目录 + 详情） ====================
let browseState = null; // { bankId, bankName, cards, index, view: 'list'|'detail' }

function renderBrowseStart() {
  const c = $('browseContainer');
  const banks = Object.values(appData.banks).sort((a, b) => b.createdAt - a.createdAt);

  if (!banks.length) {
    c.innerHTML = `<div class="empty"><span class="icon">📖</span><h3>还没有题库</h3><p>请先在「题库」页面导入题目</p></div>`;
    return;
  }

  let bankId = sessionStorage.getItem('lastPracticeBank');
  if (!bankId || !appData.banks[bankId]) bankId = banks[0].id;
  const bank = appData.banks[bankId];

  const wrongCount = (appData.wrongBooks && appData.wrongBooks[bankId]) ? appData.wrongBooks[bankId].length : 0;

      ${banks.map(b => `<option value="${b.id}"${b.id === bankId ? ' selected' : ''}>${escapeHtml(b.name)}</option>`).join('')}

  </div>
  <div class="chip-group mb-12" id="browseFilterChips">
    <span class="chip active" data-filter="all" onclick="setBrowseFilter('all', this)">全部</span>
    <span class="chip" data-filter="star" onclick="setBrowseFilter('star', this)">⭐ 收藏${favCount ? ' · '+favCount : ''}</span>
    <span class="chip" data-filter="wrong" onclick="setBrowseFilter('wrong', this)">❌ 错题${wrongCount ? ' · '+wrongCount : ''}</span>
  </div>
  <div id="browseActive"></div>`;
  renderBrowseList();
}

function setBrowseFilter(filter, el) {
  browseState.filter = filter;
  document.querySelectorAll('#browseFilterChips .chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  renderBrowseList();
}

function changeBrowseBank() {
  const bankId = document.getElementById('browseBankSelect').value;
  const bank = appData.banks[bankId];
  if (!bank) return;
  const wrongCount = (appData.wrongBooks && appData.wrongBooks[bankId]) ? appData.wrongBooks[bankId].length : 0;
  const favCount = bank.cards.filter(c => c.starred).length;
  browseState = { bankId, bankName: bank.name, cards: bank.cards, index: 0, view: 'list', filter: 'all', _filteredCards: bank.cards };
  // 更新 chip 数量
  const chips = document.querySelectorAll('#browseFilterChips .chip');
  if (chips[1]) chips[1].textContent = '⭐ 收藏' + (favCount ? ' · ' + favCount : '');
  if (chips[2]) chips[2].textContent = '❌ 错题' + (wrongCount ? ' · ' + wrongCount : '');
  renderBrowseList();
}

function renderBrowseList() {
  const c = $('browseActive');
  const st = browseState;
  if (!st || !st.cards.length) { c.innerHTML = `<div class="empty"><p>题库为空</p></div>`; return; }

  // 筛选
  let cards = st.cards;
  const wrongIds = (appData.wrongBooks && appData.wrongBooks[st.bankId]) ? appData.wrongBooks[st.bankId] : [];
  if (st.filter === 'star') cards = cards.filter(c => c.starred);
  if (st.filter === 'wrong') cards = cards.filter(c => wrongIds.includes(c.id));
  if (!cards.length) {
    c.innerHTML = `<div class="empty"><p>${st.filter === 'wrong' ? '暂无错题，做题时诊断后自动收集' : st.filter === 'star' ? '暂无收藏' : '题库为空'}</p></div>`;
    return;
  }

  // 按章节分组
  const groups = {};
  cards.forEach((card, i) => {
    const ch = card.chapter || '';
    if (!groups[ch]) groups[ch] = [];
    groups[ch].push({ ...card, _idx: st.cards.indexOf(card) });
  });
  // 保存筛选后的卡片列表，供详情导航使用
  st._filteredCards = cards.map(c => ({ ...c, _idx: st.cards.indexOf(c) }));

  let html = '';
  for (const [chapter, list] of Object.entries(groups)) {
    if (chapter) html += `<div class="section-title" style="margin-top:12px">${escapeHtml(chapter)} · ${list.length} 题</div>`;
    for (const card of list) {
      const qText = card.question.replace(/^[\d\.\、\s]+/, '').substring(0, 35);
      html += `<div class="browse-dir-item" onclick="openBrowseDetail(${card._idx})">
        <span style="font-size:11px;color:var(--text-tertiary);min-width:28px">${card._idx + 1}</span>
        <span style="flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(qText)}</span>
        <span style="font-size:20px;flex-shrink:0;cursor:pointer;padding:6px 10px;min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center" onclick="event.stopPropagation();toggleBrowseStarFromList(${card._idx})">${card.starred ? '⭐' : '☆'}</span>
      </div>`;
    }
  }

  c.innerHTML = html;
}

function openBrowseDetail(idx) {
  browseState._scrollY = document.getElementById('browseActive').scrollTop || window.scrollY;
  // idx 是全题库索引，映射到筛选后列表的位置
  const filtered = browseState._filteredCards || browseState.cards;
  const fi = filtered.findIndex(c => c._idx === idx);
  browseState.index = fi >= 0 ? fi : 0;
  browseState.view = 'detail';
  renderBrowseDetail();
}

function renderBrowseDetail() {
  const c = $('browseActive');
  const st = browseState;
  const filtered = st._filteredCards || st.cards;
  const card = filtered[st.index];
  if (!card) { backToBrowseList(); return; }
  const cur = st.index + 1, total = filtered.length;
  const wrongIds = (appData.wrongBooks && appData.wrongBooks[st.bankId]) ? appData.wrongBooks[st.bankId] : [];
  const isWrong = wrongIds.includes(card.id);

  c.innerHTML = `<div>
    <div class="flex justify-between items-center mb-10">
      <button class="btn btn-ghost btn-sm" onclick="backToBrowseList()">← 目录</button>
      <span class="text-sm text-secondary">${cur} / ${total}</span>
      <button style="background:none;border:none;font-size:24px;cursor:pointer;padding:8px 12px;line-height:1;min-width:44px;min-height:44px" onclick="toggleBrowseStar()">${card.starred ? '⭐' : '☆'}</button>
    </div>
    <div style="line-height:2;font-size:var(--font-size-lg)">
      <div style="margin-bottom:12px;font-weight:500">${escNl(card.question)}</div>
      ${card.answer ? `<div style="color:var(--text-secondary)">${escNl(card.answer)}</div>` : ''}
    </div>
    ${isWrong ? `<div class="text-center mt-10"><button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="removeFromWrongBook('${card.id}')">🗑 移出错题本</button></div>` : ''}
    <div class="flex gap-8 mt-16">
      <button class="btn btn-ghost flex-1" onclick="browsePrev()"${st.index === 0 ? ' disabled style="opacity:.4"' : ''}>← 上一题</button>
      <button class="btn btn-ghost flex-1" onclick="browseNext()"${st.index >= total - 1 ? ' disabled style="opacity:.4"' : ''}>下一题 →</button>
    </div>
  </div>`;
}

function backToBrowseList() {
  browseState.view = 'list';
  renderBrowseList();
  setTimeout(() => {
    if (browseState._scrollY) {
      document.getElementById('browseActive').scrollTop = browseState._scrollY;
      window.scrollTo(0, browseState._scrollY);
    }
  }, 50);
}

function browsePrev() { const filtered = browseState._filteredCards || browseState.cards; if (browseState.index > 0) { browseState.index--; renderBrowseDetail(); } }
function browseNext() { const filtered = browseState._filteredCards || browseState.cards; if (browseState.index < filtered.length - 1) { browseState.index++; renderBrowseDetail(); } }

function removeFromWrongBook(cardId) {
  if (!browseState) return;
  const bankId = browseState.bankId;
  if (appData.wrongBooks && appData.wrongBooks[bankId]) {
    appData.wrongBooks[bankId] = appData.wrongBooks[bankId].filter(id => id !== cardId);
  }
  saveData(appData);
  showToast('已移出错题本');
  renderBrowseDetail();
}

function toggleBrowseStarFromList(idx) {
  const card = browseState.cards[idx];
  card.starred = !card.starred;
  const bank = appData.banks[browseState.bankId];
  if (bank) { const c = bank.cards.find(x => x.id === card.id); if (c) c.starred = card.starred; }
  saveData(appData);
  renderBrowseList();
}

function toggleBrowseStar() {
  if (!browseState) return;
  const filtered = browseState._filteredCards || browseState.cards;
  const card = filtered[browseState.index];
  if (!card) return;
  card.starred = !card.starred;
  const bank = appData.banks[browseState.bankId];
  if (bank) { const c = bank.cards.find(x => x.id === card.id); if (c) c.starred = card.starred; }
  saveData(appData);
  renderBrowseDetail();
}

// ==================== 口诀模式 ====================
function renderKoujueStart() {
  const c = $('koujueContainer');
  const banks = Object.values(appData.banks).sort((a, b) => b.createdAt - a.createdAt);

  if (!banks.length) {
    c.innerHTML = `<div class="empty"><span class="icon">🧠</span><h3>还没有题库</h3><p>请先导入含口诀的简答题文件</p></div>`;
    return;
  }

  let bankId = sessionStorage.getItem('lastPracticeBank');
  if (!bankId || !appData.banks[bankId]) bankId = banks[0].id;

  let allKjBanks = [];
  for (const b of banks) {
    const kjCards = b.cards.filter(x => x.koujue);
    if (kjCards.length) allKjBanks.push({ bankId: b.id, bankName: b.name, cards: kjCards });
  }

  if (!allKjBanks.length) {
    c.innerHTML = `<div class="empty"><span class="icon">🧠</span><h3>当前没有口诀</h3><p>导入含「口诀」格式的简答题文件即可<br>格式：<code>口诀：全（全民化）民（民主化）</code></p></div>`;
    return;
  }

  c.innerHTML = `<div class="flex justify-between items-center mb-16">
    <h1 style="font-size:24px;font-weight:800;letter-spacing:-.02em">口诀背诵</h1>
    <select id="kjBankSelect" style="width:auto;min-width:150px;padding:10px 14px;border:2px solid var(--border);border-radius:10px;background:var(--bg-card);color:var(--text);font-size:14px" onchange="kjCategoryFilter=null;renderKoujueCards()">
      ${allKjBanks.map(b => `<option value="${b.bankId}"${b.bankId === bankId ? ' selected' : ''}>${escapeHtml(b.bankName)} (${b.cards.length}条)</option>`).join('')}
    </select>
  </div>
  <div id="kjCategoryFilter" style="margin-bottom:12px"></div>
  <div id="kjCategoryHint" style="font-size:12px;color:var(--text-tertiary);margin-bottom:12px"></div>
  <div id="kjList"></div>`;

  renderKoujueCards();
}

function getFilteredKjCards(bank) {
  if (!bank || !bank.cards) return [];
  const kjCards = bank.cards.filter(x => x.koujue);
  if (!kjCategoryFilter || !kjCategoryFilter.size) return kjCards;
  return kjCards.filter(c => {
    const q = (c.question || "").trim();
    const matches = q.match(/（[^）]{1,8}）/g) || [];
    return matches.some(m => kjCategoryFilter.has(m));
  });
}

function renderKjCategoryFilter() {
  const div = document.getElementById("kjCategoryFilter");
  if (!div) return;
  const sel = document.getElementById("kjBankSelect");
  if (!sel) return;
  const bank = appData.banks[sel.value];
  if (!bank) { div.innerHTML = ""; return; }
  const cats = extractCategories(bank);
  if (!cats.length) { div.innerHTML = ""; return; }
  if (!kjCategoryFilter) kjCategoryFilter = new Set(cats);
  let h = "<label class=\"form-label\" style=\"font-size:13px\">🏷️ 分类筛选</label><div class=\"chip-group\">";
  h += "<span class=\"chip" + (kjCategoryFilter.size === cats.length ? " active" : "") + "\" onclick=\"toggleAllKjCategories()\">全部</span>";
  for (const cat of cats) {
    h += "<span class=\"chip" + (kjCategoryFilter.has(cat) ? " active" : "") + "\" onclick=\"toggleKjCategory('" + cat + "')\" style=\"margin-left:4px\">" + cat + "</span>";
  }
  h += "</div>";
  div.innerHTML = h;
  updateKjFilteredCount();
}

function toggleAllKjCategories() {
  const sel = document.getElementById("kjBankSelect");
  if (!sel) return;
  const bank = appData.banks[sel.value];
  if (!bank) return;
  const cats = extractCategories(bank);
  if (kjCategoryFilter && kjCategoryFilter.size === cats.length) kjCategoryFilter = new Set();
  else kjCategoryFilter = new Set(cats);
  renderKjCategoryFilter();
  renderKoujueCards();
}

function toggleKjCategory(cat) {
  if (!kjCategoryFilter) return;
  if (kjCategoryFilter.has(cat)) {
    if (kjCategoryFilter.size <= 1) return;
    kjCategoryFilter.delete(cat);
  } else kjCategoryFilter.add(cat);
  renderKjCategoryFilter();
  renderKoujueCards();
}

function updateKjFilteredCount() {
  const sel = document.getElementById("kjBankSelect");
  if (!sel) return;
  const bank = appData.banks[sel.value];
  if (!bank) return;
  const total = bank.cards.filter(x => x.koujue).length;
  const filtered = getFilteredKjCards(bank);
  const hint = document.getElementById("kjCategoryHint");
  if (hint) hint.textContent = "筛选后 " + filtered.length + " / " + total + " 条口诀";
}

function renderKoujueCards() {
  const sel = document.getElementById('kjBankSelect');
  if (!sel) return;
  const bank = appData.banks[sel.value];
  if (!bank) return;
  const cards = getFilteredKjCards(bank);
  renderKjCategoryFilter();
  if (!cards.length) { document.getElementById('kjList').innerHTML = `<div class="empty"><p>该分类下没有口诀</p></div>`; return; }

  const groups = {};
  cards.forEach(card => { const ch = card.chapter || '未分类'; if (!groups[ch]) groups[ch] = []; groups[ch].push(card); });

  let html = '';
  for (const [chapter, list] of Object.entries(groups)) {
    html += `<div class="section"><div class="section-title">${escapeHtml(chapter)} · ${list.length} 条</div>`;
    for (const card of list) {
      const parsed = parseKoujue(card.koujue);
      const keywordsOnly = parsed.map(p => escapeHtml(p.char)).join(' ');
      html += `<div class="kj-card" id="kj-${card.id}">
        <div class="kj-mnemonic">
          ${keywordsOnly || escapeHtml(card.koujue)}
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();editKoujue('${card.id}')" style="padding:2px 6px;font-size:12px;opacity:.4;float:right" title="编辑口诀">✏️</button>
        </div>
        <div class="kj-meaning" id="kj-mean-${card.id}">
          <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:6px">${escapeHtml(card.question.replace(/^[\d\.\、\s]+/, ''))}</div>
          ${parsed.map(p => `<span class="kj-char">${escapeHtml(p.char)}</span><span class="kj-desc">（${escapeHtml(p.desc)}）</span>`).join(' ')}
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  document.getElementById('kjList').innerHTML = html;

  for (const card of cards) {
    const el = document.getElementById('kj-' + card.id);
    const meanEl = document.getElementById('kj-mean-' + card.id);
    if (el && meanEl) {
      el.onclick = () => {
        const showing = meanEl.classList.contains('show');
        document.querySelectorAll('#kjList .kj-meaning.show').forEach(m => m.classList.remove('show'));
        if (!showing) meanEl.classList.add('show');
      };
    }
  }
}

function parseKoujue(kj) {
  if (!kj) return [];
  const result = [];
  const re = /[^\s，,。！!？?、；;：:""''（）()《》—\-]+（[^）]*）/g;
  let m;
  while ((m = re.exec(kj)) !== null) {
    const full = m[0], li = full.lastIndexOf('（');
    if (li > 0) result.push({ char: full.substring(0, li), desc: full.substring(li + 1, full.length - 1) });
  }
  if (!result.length && kj.trim()) result.push({ char: kj.trim(), desc: '' });
  return result;
}

function editKoujue(cardId) {
  // 找到卡片所属的 bank
  let bank = null, card = null;
  for (const b of Object.values(appData.banks)) {
    const c = b.cards.find(x => x.id === cardId);
    if (c) { bank = b; card = c; break; }
  }
  if (!card) return;

  const el = document.getElementById('kj-' + cardId);
  if (!el) return;

  el.innerHTML = `<div style="display:flex;flex-direction:column;gap:8px">
    <textarea id="kjEditTextarea" style="width:100%;min-height:60px;padding:8px;border:2px solid var(--primary);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;resize:vertical;font-family:inherit;line-height:1.6" rows="2">${escapeHtml(card.koujue || '')}</textarea>
    <div class="flex gap-8" style="justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();cancelEditKoujue('${cardId}')">取消</button>
      <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();saveKoujue('${cardId}')">保存</button>
    </div>
  </div>`;
  el.onclick = null; // 编辑时禁用点击展开
}

function cancelEditKoujue(cardId) {
  // 重新渲染口诀列表
  renderKoujueCards();
}

function saveKoujue(cardId) {
  const ta = document.getElementById('kjEditTextarea');
  if (!ta) return;
  const newKj = ta.value.trim();

  let bank = null, card = null;
  for (const b of Object.values(appData.banks)) {
    const c = b.cards.find(x => x.id === cardId);
    if (c) { bank = b; card = c; break; }
  }
  if (!card) return;

  card.koujue = newKj;
  saveData(appData);
  renderKoujueCards();
}

      <div style="width:140px"><input type="range" min="0.5" max="2" value="${s.voiceRate || 0.9}" step="0.1" oninput="updateVoiceRate(parseFloat(this.value))" onchange="updateVoiceRate(parseFloat(this.value))"></div></div>
    <div class="setting-item"><div><div class="setting-label">朗读音调</div><div class="setting-desc" id="pitchVal">${s.voicePitch || 1.0}x</div></div>
      <div style="width:140px"><input type="range" min="0.5" max="2" value="${s.voicePitch || 1.0}" step="0.1" oninput="updateVoicePitch(parseFloat(this.value))" onchange="updateVoicePitch(parseFloat(this.value))"></div></div></div>

  <div class="section"><div class="section-title">外观</div>
    <div class="setting-item"><div><div class="setting-label">夜间模式</div><div class="setting-desc">暗色主题，夜间刷题更护眼</div></div>
      <label class="toggle"><input type="checkbox" id="darkToggle"${s.darkMode ? ' checked' : ''} onchange="saveSetting('darkMode', this.checked)"><span class="slider"></span></label></div>
    <div class="setting-item"><div><div class="setting-label">主题颜色</div><div class="setting-desc" id="colorVal">${({teal:'青绿',purple:'浅紫',blue:'浅蓝',rose:'玫红',pink:'粉色',green:'浅绿',yellow:'浅黄',bw:'黑白'})[s.color||'teal']}</div></div>
      <div class="color-dots"><span class="color-dot${(s.color||'teal')==='teal'?' active':''}" style="background:#0891b2" onclick="saveThemeColor('teal')"></span><span class="color-dot${s.color==='purple'?' active':''}" style="background:#9333ea" onclick="saveThemeColor('purple')"></span><span class="color-dot${s.color==='blue'?' active':''}" style="background:#3b82f6" onclick="saveThemeColor('blue')"></span><span class="color-dot${s.color==='rose'?' active':''}" style="background:#e11d48" onclick="saveThemeColor('rose')"></span><span class="color-dot${s.color==='pink'?' active':''}" style="background:#ec4899" onclick="saveThemeColor('pink')"></span><span class="color-dot${s.color==='green'?' active':''}" style="background:#22c55e" onclick="saveThemeColor('green')"></span><span class="color-dot${s.color==='yellow'?' active':''}" style="background:#eab308" onclick="saveThemeColor('yellow')"></span><span class="color-dot${s.color==='bw'?' active':''}" style="background:#555" onclick="saveThemeColor('bw')"></span></div></div>
    <div class="setting-item"><div><div class="setting-label">字体大小</div><div class="setting-desc" id="fontVal">${s.fontSize}px</div></div>
      <div class="flex items-center gap-8" style="width:140px"><span style="font-size:13px">A</span><input type="range" min="14" max="24" value="${s.fontSize}" step="1" oninput="updateFontSize(parseInt(this.value))" onchange="updateFontSize(parseInt(this.value))"><span style="font-size:18px;font-weight:700">A</span></div></div></div>

  <div class="section"><div class="section-title">关于</div>
    <div class="setting-item"><div><div class="setting-label">挖空背诵工具 · 小阮出品</div><div class="setting-desc">手机刷题背书工具 · 纯前端离线可用</div></div></div>
    <div class="setting-item" style="cursor:pointer" onclick="clearAllData()"><div><div class="setting-label" style="color:var(--danger)">🗑️ 删除所有数据</div><div class="setting-desc">清空全部题库和设置，不可恢复</div></div><div style="display:flex;align-items:center;color:var(--danger)">→</div></div>
    <div class="setting-item" style="cursor:pointer" onclick="checkUpdate()"><div><div class="setting-label">🔄 检查更新</div><div class="setting-desc">点击清除缓存并刷新，获取最新版本</div></div><div style="display:flex;align-items:center">→</div></div></div>`;
}

function checkUpdate() {
  showToast('正在清除缓存...');
  // 清除 Service Worker 缓存
  if ('caches' in window) {
    caches.keys().then(function(names) {
      names.forEach(function(name) { caches.delete(name); });
    });
  }
  // 强制刷新（跳过浏览器缓存）
  setTimeout(function() { location.reload(true); }, 500);
}

function updateDensitySetting(val, el) {
  saveSetting('density', val);
  document.querySelectorAll('#settingsDensity .seg').forEach(s => s.classList.remove('active'));
  if (el) el.classList.add('active');
}

function updateFontSize(val) { saveSetting('fontSize', val); document.getElementById('fontVal').textContent = val + 'px'; }
function updateVoiceRate(val) { saveSetting('voiceRate', val); document.getElementById('rateVal').textContent = val + 'x'; }
function updateVoicePitch(val) { saveSetting('voicePitch', val); document.getElementById('pitchVal').textContent = val + 'x'; }
function updateVoiceName(val) {
  saveSetting('voiceName', val || '');
  document.getElementById('voiceNameVal').textContent = val || '自动选择';
}

function updateReadMode(val) {
  saveSetting('readMode', val);
  document.getElementById('readModeVal').textContent = {once:'仅读一遍',loop:'循环朗读','auto-next':'自动下一题','three-times':'每题三遍'}[val];
}

function loadVoices() {
  if (!window.speechSynthesis) return;
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) {
    // Chrome 等浏览器异步加载语音列表，监听 voiceschanged 事件
    window.speechSynthesis.onvoiceschanged = () => {
      window.speechSynthesis.onvoiceschanged = null;
      loadVoices();
    };
    // 兜底：200ms 后重试
    setTimeout(() => { if (window.speechSynthesis) loadVoices(); }, 200);
    return;
  }
  const sel = document.getElementById('voiceSelect');
  if (!sel) return;
  // 清空旧选项（保留第一个"自动选择"）
  while (sel.options.length > 1) sel.remove(1);
  const keep = ['婷婷', 'Sandy', 'sandy', 'Alex'];
  const filtered = voices.filter(v => keep.some(k => v.name.includes(k)));
  for (const v of filtered) {
    const opt = document.createElement('option');
    opt.value = v.name; opt.textContent = v.name + ' (' + v.lang + ')';
    if (v.name === appData.settings.voiceName) opt.selected = true;
    sel.appendChild(opt);
  }
}

async function makeBackupCode() {
  const json = JSON.stringify(appData);
  // 尝试 gzip 压缩（减小 80-90%）
  if (typeof CompressionStream !== 'undefined') {
    try {
      const blob = new Blob([json]);
      const cs = new CompressionStream('gzip');
      const stream = blob.stream().pipeThrough(cs);
      const compressed = await new Response(stream).blob();
      const bytes = new Uint8Array(await compressed.arrayBuffer());
      let bin = '';
      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return 'Z' + btoa(bin);
    } catch(e) {}
  }
  // 不支持压缩时用原始 base64
  const bytes = new TextEncoder().encode(json);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return 'U' + btoa(bin);
}

async function copyBackup() {
  if (!isPermanentAuth()) { showToast('试用版不支持导出'); return; }
  try {
    const code = await makeBackupCode();
    showBackupModal(code);
    // 同时尝试自动复制
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(code).then(function() {
        showToast('备份码已自动复制');
      }).catch(function() {});
    }
  } catch(e) { showToast('导出失败'); }
}

function showBackupModal(code) {
  var ov = document.createElement('div'); ov.className = 'modal-overlay'; ov.id = 'backupModal';
  ov.innerHTML = '<div class="modal" style="border-radius:var(--radius);max-width:380px;margin:auto;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px">'
    + '<h3 style="margin-bottom:10px">📋 备份码（' + code.length + '字符）</h3>'
    + '<textarea id="backupCodeText" readonly style="width:100%;min-height:80px;font-size:11px;word-break:break-all;padding:10px;border:2px solid var(--border);border-radius:8px;background:var(--bg-input);color:var(--text)">' + code + '</textarea>'
    + '<div class="flex gap-8 mt-12"><button class="btn btn-primary flex-1" onclick="copyBackupCode()">📋 一键复制</button>'
    + '<button class="btn btn-ghost flex-1" onclick="document.getElementById(\'backupModal\').remove()">关闭</button></div>'
    + '</div>';
  document.body.appendChild(ov);
  ov.addEventListener('click', function(e) { if (e.target === ov) ov.remove(); });
}

function copyBackupCode() {
  var ta = document.getElementById('backupCodeText');
  ta.select();
  try {
    document.execCommand('copy');
    showToast('已复制到剪贴板');
  } catch(e) {
    ta.setSelectionRange(0, ta.value.length);
    navigator.clipboard.writeText(ta.value).then(function() {
      showToast('已复制到剪贴板');
    }).catch(function() {
      showToast('复制失败，请长按手动复制');
    });
  }
}

function showRestorePrompt() {
  const ov = document.createElement('div'); ov.className = 'modal-overlay';
  ov.innerHTML = `<div class="modal" style="border-radius:var(--radius);max-width:380px;margin:auto;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px">
    <h3 style="margin-bottom:10px">📥 粘贴备份码</h3>
    <textarea id="restoreTextarea" placeholder="在此粘贴之前复制的备份码..." style="width:100%;min-height:100px;font-size:13px;padding:10px;border:2px solid var(--border);border-radius:8px;background:var(--bg-input);color:var(--text)"></textarea>
    <div class="flex gap-8 mt-12">
      <button class="btn btn-ghost flex-1" onclick="this.closest('.modal-overlay').remove()">取消</button>
      <button class="btn btn-primary flex-1" onclick="doRestore(this)">恢复</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
}

async function doRestore(btn) {
  const code = document.getElementById('restoreTextarea').value.trim();
  if (!code) { showToast('请粘贴备份码'); return; }
  try {
    const prefix = code[0];
    const base64 = code.slice(1);
    const bin = atob(base64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

    let json;
    if (prefix === 'Z' && typeof DecompressionStream !== 'undefined') {
      // gzip 压缩的备份码
      try {
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
        json = await new Response(stream).text();
      } catch(e) { json = new TextDecoder().decode(bytes); }
    } else {
      // 未压缩的备份码（兼容旧版）
      json = new TextDecoder().decode(bytes);
    }

    const data = JSON.parse(json);
    if (!data.banks) { showToast('备份码无效'); return; }
    appData = data;
    saveData(appData);
    showToast('恢复成功！');
    setTimeout(() => location.reload(), 800);
  } catch(e) { showToast('备份码无效'); }
}

function clearWrongBook() {
  showConfirm('清空错题本', '确定清空所有题库的错题记录吗？', () => {
    appData.wrongBooks = {};
    saveData(appData);
    showToast('错题本已清空');
  });
}

function clearAllData() {
  showConfirm('删除所有数据', '此操作不可撤销！将删除所有题库、设置和进度。', () => {
    appData = { banks: {}, settings: {}, seqProgress: {}, favorites: {}, wrongBooks: {} };
    saveData(appData);
    showToast('已全部删除');
    switchTab('banks');
  });
}
</script>

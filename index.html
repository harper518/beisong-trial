function applyCheckToInputs(card) {
  const inputs = document.querySelectorAll('#cardText .blank-input');
  let hasWrong = false;
  const wrongIndices = [];
  const wrongAnswers = [];
  inputs.forEach((inp, i) => {
    const userAns = inp.value.trim();
    const correctAns = (inp.dataset.ans || '').trim();
    inp.classList.remove('correct', 'wrong');
    if (fuzzyMatch(userAns, correctAns)) {
      inp.classList.add('correct');
    } else {
      inp.classList.add('wrong');
      hasWrong = true;
      wrongIndices.push(i);
      wrongAnswers.push(userAns);
    }
  });
  // 有错则收集整题到错题本，记录错空位置和填的答案
  if (hasWrong) {
    const wb = getWrongBook(practiceState.bankId);
    wb[card.id] = { wrongIndices: wrongIndices, wrongAnswers: wrongAnswers };
    saveData(appData);
  }

  // 间隔重复追踪
  const bank = appData.banks[practiceState.bankId];
  const bankCard = bank ? bank.cards.find(c => c.id === card.id) : null;
  if (bankCard) {
    if (hasWrong) {
      // 答错：设置明天复习，stage 保持不变或设为1
      bankCard.srStage = bankCard.srStage || 1;
      bankCard.srNextReview = Date.now() + 86400000; // 1天后
    } else if (bankCard.srStage && bankCard.srStage > 0) {
      // 之前错过，这次全对：晋级
      const intervals = [0, 86400000, 172800000, 345600000, 604800000]; // 0, 1d, 2d, 4d, 7d
      bankCard.srStage = Math.min(5, bankCard.srStage + 1);
      if (bankCard.srStage >= 5) {
        bankCard.srNextReview = null; // 已掌握，不再强制复习
        bankCard.srStage = 0; // 重置
      } else {
        bankCard.srNextReview = Date.now() + intervals[bankCard.srStage];
      }
    }
    saveData(appData);
  }

  // 🔥 连续答对 & 🎰 随机幸运
  if (!hasWrong) {
    practiceState._streak = (practiceState._streak || 0) + 1;
    // 连续答对彩蛋
    const streakMilestones = [5, 10, 15, 20, 30, 50];
    if (streakMilestones.includes(practiceState._streak)) {
      const emojis = {5:'🔥',10:'💥',15:'⚡',20:'🌟',30:'💎',50:'👑'};
      showToast(emojis[practiceState._streak] + ' 完美连击！×' + practiceState._streak);
    }
  } else {
    practiceState._streak = 0;
  }
}

function regenerateCurrentBlanks() {
  saveCurrentAnswers();
  const card = practiceState.cards[practiceState.index];
  // 有重叠空 → 切换替代空；否则 → 按当前密度重新生成
  if (card._manualBlanks || hasOverlappingBlanks(card)) {
    card._blankRound = (card._blankRound || 0) + 1;
  } else {
    Object.assign(card, regenerateBlanks(card, appData.settings.density || 'low'));
    delete card._manualBlanks;
  }
  delete practiceState.answers[card.id];
  practiceState.revealed.delete(card.id);
  const bank = appData.banks[practiceState.bankId];
  if (bank) { const c = bank.cards.find(x => x.id === card.id); if (c) { c.blanks = card.blanks; c.fullText = card.fullText; if (!card._manualBlanks) delete c._manualBlanks; } }
  saveData(appData);
  renderPracticeCard();
  showToast('已重新挖空');
}

  const copy = JSON.parse(JSON.stringify(card));

  const saved = {};
  const q = (copy.question || "").trim();
  const answerStart = q.length + 1;
  for (const b of (copy.blanks || [])) {
    for (let j = b.start - answerStart; j < b.end - answerStart; j++) saved[j] = true;
  }
  copy._charSelected = {};

  previewData = { name: "单题编辑", cards: [copy], mode: "manual", _singleCardEdit: true, _cardIdx: practiceState.index };
  showImportPreview("单题编辑", [copy]);
}

function hasOverlappingBlanks(card) {
  const all = card.blanks || [];
  for (let i = 0; i < all.length; i++) {
    for (let j = i + 1; j < all.length; j++) {
      if (all[i].start < all[j].end && all[j].start < all[i].end) return true;
    }
  }
  return false;
}

function changeDensity(density, el) {
  saveSetting('density', density);
  document.querySelectorAll('#densityCtrl .seg').forEach(s => s.classList.remove('active'));
  if (el) el.classList.add('active');
  if (!practiceState || !practiceState.cards) return;
  saveCurrentAnswers();
  let count = 0;
  for (const card of practiceState.cards) {
    if (card._manualBlanks) continue;
    Object.assign(card, regenerateBlanks(card, density));
    delete card._manualBlanks;
    delete practiceState.answers[card.id];
    practiceState.revealed.delete(card.id);
    count++;
  }
  // 同步到题库
  const bank = appData.banks[practiceState.bankId];
  if (bank) {
    for (const card of practiceState.cards) {
      if (card._manualBlanks) continue;
      const c = bank.cards.find(x => x.id === card.id);
      if (c) { c.blanks = card.blanks; c.fullText = card.fullText; delete c._manualBlanks; }

    saveData(appData);

  renderPracticeCard();
}

function speakCard() {
  const ss = window.speechSynthesis;
  if (!ss) { showToast('浏览器不支持语音朗读'); return; }
  const card = practiceState.cards[practiceState.index];
  if (!card) return;
  // 切到不同卡片 → 取消旧的，重新开始
  if (practiceState._speakingCardId && practiceState._speakingCardId !== card.id) {
    ss.cancel(); practiceState._speakingCardId = null;
  }
  // 暂停 → 继续
  if (ss.speaking && ss.paused) { ss.resume(); return; }
  // 朗读中 → 暂停
  if (ss.speaking) { ss.pause(); return; }
  // 开始朗读
  practiceState._speakingCardId = card.id;
  doSpeakCard();
}

function doSpeakCard() {
  const card = practiceState.cards[practiceState.index];
  if (!card) return;
  const ss = window.speechSynthesis;
  ss.cancel();
  const rawText = card.fullText || card.question + card.answer;
  const cleanText = rawText.replace(/\\n/g, '，').replace(/\n/g, '，');
  var u = new SpeechSynthesisUtterance(cleanText);
  u.rate = appData.settings.voiceRate || 0.9;
  u.pitch = appData.settings.voicePitch || 1.0;

  var voices = ss.getVoices();
  // 1. 优先使用用户保存的指定语音
  var voiceName = appData.settings.voiceName;
  if (voiceName && voices.length) {
    var picked = voices.find(function(v) { return v.name === voiceName; });
    if (picked) { u.voice = picked; u.lang = picked.lang || 'zh-CN'; }
  }
  // 2. 没指定语音 → 自动匹配中文语音（兼容QQ浏览器/讯飞等）
  if (!u.voice && voices.length) {
    var zhVoice = voices.find(isChineseVoice);
    if (zhVoice) { u.voice = zhVoice; u.lang = zhVoice.lang || 'zh-CN'; }
  }
  // 3. 没找到中文语音 → 用第一个可用语音 + 中文 lang
  if (!u.voice && voices.length) {
    u.voice = voices[0];
  }
  // 4. 没有任何语音 → 设 lang 为 zh-CN，让引擎自行处理
  u.lang = u.lang || 'zh-CN';
  // 朗读结束后的行为
  const readMode = appData.settings.readMode || 'once';
  u.onend = () => {
    if (readMode === 'loop') {
      // 循环读同一题
      setTimeout(() => doSpeakCard(), 500);
    } else if (readMode === 'three-times') {
      practiceState._readCount = (practiceState._readCount || 0) + 1;
      if (practiceState._readCount < 3) {
        setTimeout(() => doSpeakCard(), 500);
      } else {
        practiceState._readCount = 0;
        // 3遍读完，自动下一题
        if (practiceState.index < practiceState.total - 1) {
          setTimeout(() => { nextCard(); setTimeout(() => doSpeakCard(), 300); }, 500);
        }
      }
    } else if (readMode === 'auto-next') {
      // 自动下一题
      if (practiceState.index < practiceState.total - 1) {
        setTimeout(() => { nextCard(); setTimeout(() => doSpeakCard(), 300); }, 500);
      }
    }
    // 'once' mode: do nothing
  };
  practiceState._readCount = 0;
  ss.speak(u);
}

function showPracticeResult() {

  if (st.mode === 'sequential') {
    const pos = getSeqProgress(st.bankId);
        const filteredLen = getFilteredCards(bank).length;

  const ov = document.createElement('div'); ov.className = 'modal-overlay'; ov.style.animation = 'none';
  ov.innerHTML = '<div class="modal" style="animation:none;border-radius:var(--radius);max-width:300px;margin:auto;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px 16px"><h3 style="margin-bottom:16px;font-size:16px;text-align:center">📖 选择说明书</h3>' +

    '<button class="btn btn-ghost btn-block" style="font-size:13px">取消</button></div>';

  btns.forEach((btn, i) => {
    btn.onclick = () => { ov.remove(); showManual(keys[i]); };
  });

function retrySameSettings() {
  const bankId = practiceState.bankId;
  const bank = appData.banks[bankId];
  if (!bank) return;
  const count = practiceState.total;
  let selected;
  const filteredCards = getFilteredCards(bank);
  if (practiceState.mode === 'sequential') {
    const pos = getSeqProgress(bankId);
    if (pos >= filteredCards.length) {
      appData.seqProgress[bankId] = 0;
      saveData(appData);
      selected = [...filteredCards.slice(0, count)];
    } else {
      selected = [...filteredCards.slice(pos, Math.min(pos + count, filteredCards.length))];
    }
  } else {
    selected = shuffle(filteredCards).slice(0, count);
  }
  const qh = new Set();
  if (hideQuestionStart) { for (const c of selected) qh.add(c.id); }
  practiceState = { ...practiceState, cards: selected, index: 0, answers: {}, revealed: new Set(), questionHidden: qh, koujueExpanded: {}, total: selected.length, answersHidden: false };
  $('practiceResult').style.display = 'none';
  $('practiceActive').style.display = 'block';
  renderPracticeCard();
}

function backToPracticeSetup() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  practiceState = null;
  $('practiceResult').style.display = 'none';
  $('practiceActive').style.display = 'none';
  renderPracticeSetup();
}

    <input type="search" id="browseSearchInput" placeholder="🔍 搜索题目..." style="width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;background:var(--bg-card);color:var(--text);font-size:14px" oninput="doBrowseSearch()">
  </div>
  <div class="chip-group mb-12" id="browseFilterChips">
    <span class="chip active" data-filter="all" onclick="setBrowseFilter('all', this)">全部</span>
    <span class="chip" data-filter="star" onclick="setBrowseFilter('star', this)">⭐ 收藏${favCount ? ' · '+favCount : ''}</span>
    
	    <span class="chip" data-filter="koujue" onclick="setBrowseFilter('koujue', this)">💡 口诀${kjCount ? ' · '+kjCount : ''}</span>
  </div>
  <div class="chip-group mb-12" id="browseStarSubChips" style="display:none;flex-wrap:nowrap;overflow-x:auto">
      <span class="chip active" data-sub="all" onclick="setStarSubFilter('all', this)">全部</span>
      <span class="chip" data-sub="question" onclick="setStarSubFilter('question', this)">📝 题目</span>
      <span class="chip" data-sub="koujue" onclick="setStarSubFilter('koujue', this)">💡 口诀</span>
      <span class="chip" data-sub="wrong" onclick="setStarSubFilter('wrong', this)">❌ 错题</span>
    </div>
    <div id="browseActive"></div>`;
  renderBrowseList();
}

function setBrowseFilter(filter, el) {
  browseState.filter = filter;
  browseState.starSub = 'all';
  browseState.searchQuery = '';
  const si = document.getElementById('browseSearchInput');
  if (si) si.value = '';
  document.querySelectorAll('#browseFilterChips .chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  // 收藏子分类：显示/隐藏
  const subChips = document.getElementById('browseStarSubChips');
  if (subChips) {
    subChips.style.display = filter === 'star' ? '' : 'none';
    if (filter === 'star') {
      subChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      const allChip = subChips.querySelector('[data-sub="all"]');
      if (allChip) allChip.classList.add('active');
    }
  }
  renderBrowseList();
}

function setStarSubFilter(sub, el) {
  browseState.starSub = sub;
  const subChips = document.getElementById('browseStarSubChips');
  if (subChips) {
    subChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    if (el) el.classList.add('active');
  }
  renderBrowseList();
}

function doBrowseSearch() {
  const input = document.getElementById('browseSearchInput');
  browseState.searchQuery = input ? input.value.trim().toLowerCase() : '';
  renderBrowseList();
}

function changeBrowseBank() {
  const bankId = document.getElementById('browseBankSelect').value;
  const bank = appData.banks[bankId];
  if (!bank) return;
  // 清空搜索
  const searchInput = document.getElementById('browseSearchInput');
  if (searchInput) searchInput.value = '';
  const wrongCount = Object.keys(getWrongBook(bankId)).length;
  const favCount = bank.cards.filter(c => c.starred).length;
	  const kjCount = bank.cards.filter(c => c.koujue).length;
  browseState = { bankId, bankName: bank.name, cards: bank.cards, index: 0, view: 'list', filter: 'all', starSub: 'all', searchQuery: '', _filteredCards: bank.cards };
  // 更新 chip 数量
  const chips = document.querySelectorAll('#browseFilterChips .chip');
  if (chips[1]) chips[1].textContent = '⭐ 收藏' + (favCount ? ' · ' + favCount : '');
  if (chips[2]) chips[2].textContent = '💡 口诀' + (kjCount ? ' · ' + kjCount : '');
  // 重置所有 chip 的 active 类到"全部"
  chips.forEach(function(c) { c.classList.remove('active'); });
  if (chips[0]) chips[0].classList.add('active');
  var subChips = document.getElementById('browseStarSubChips');
  if (subChips) subChips.style.display = 'none';
  renderBrowseList();
}

function renderBrowseList() {
  const c = $('browseActive');
  const st = browseState;
  if (!st || !st.cards.length) { c.innerHTML = `<div class="empty"><p>题库为空</p></div>`; return; }

  // 筛选
  let cards = st.cards;
  const wbBrowse = getWrongBook(st.bankId);
  if (st.filter === 'star') {
    cards = cards.filter(c => c.starred);
    // 收藏子分类
    if (st.starSub === 'question') cards = cards.filter(c => !c.koujue && !(c.id in wbBrowse));
    else if (st.starSub === 'koujue') cards = cards.filter(c => c.koujue);
    else if (st.starSub === 'wrong') cards = cards.filter(c => c.id in wbBrowse);
  }
  if (st.filter === 'wrong') cards = cards.filter(c => c.id in wbBrowse);
			  if (st.filter === 'koujue') cards = cards.filter(c => c.koujue);
  // 搜索过滤
  if (st.searchQuery) {
    cards = cards.filter(c => (c.question || '').toLowerCase().includes(st.searchQuery) || (c.answer || '').toLowerCase().includes(st.searchQuery));
  }
  if (!cards.length) {
    let emptyMsg = '题库为空';
    if (st.searchQuery) emptyMsg = '未找到匹配"'+escapeHtml(st.searchQuery)+'"的题目';
    else if (st.filter === 'wrong') emptyMsg = '暂无错题，做题时诊断后自动收集';
    else if (st.filter === 'koujue') emptyMsg = '暂无口诀';
    else if (st.filter === 'star') {
      if (st.starSub === 'question') emptyMsg = '收藏中没有此类题目';
      else if (st.starSub === 'koujue') emptyMsg = '收藏中没有带口诀的题目';
      else if (st.starSub === 'wrong') emptyMsg = '收藏中没有错题';
      else emptyMsg = '暂无收藏';
    }
    c.innerHTML = '<div class="empty"><p>' + emptyMsg + '</p></div>';
    return;
  }

  // 按章节分组
  const groups = {};
  cards.forEach((card, i) => {
    const ch = card.chapter || '';
    if (!groups[ch]) groups[ch] = [];
    groups[ch].push({ ...card, _idx: st.cards.indexOf(card) });
  });
  // 保存筛选后的卡片列表，供详情导航使用
  st._filteredCards = cards.map(c => ({ ...c, _idx: st.cards.indexOf(c) }));

  let html = '';
  if (st.filter === 'koujue') {
    // 口诀卡片格式（带收藏和修改）
    for (const [chapter, list] of Object.entries(groups)) {
      if (chapter) html += '<div class="section-title" style="margin-top:12px">' + escapeHtml(chapter) + ' · ' + list.length + ' 条</div>';
      for (const card of list) {
        const parsed = typeof parseKoujue === 'function' ? parseKoujue(card.koujue || '') : [];
        const keywordsOnly = parsed.map(p => escapeHtml(p.char)).join(' ');
        html += '<div class="kj-card" id="kjb-' + card.id + '">';
        html += '<div class="kj-mnemonic" style="display:flex;justify-content:space-between;align-items:flex-start">';
        html += '<span style="flex:1">' + (keywordsOnly || escapeHtml(card.koujue || '')) + '</span>';
        html += '<span style="display:flex;gap:4px;flex-shrink:0">';
        html += '<span style="font-size:20px;cursor:pointer;padding:2px 6px;min-width:36px;display:inline-flex;align-items:center;justify-content:center" onclick="event.stopPropagation();toggleBrowseStarFromList(' + card._idx + ')">' + (card.starred ? '⭐' : '☆') + '</span>';
        html += '<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();editKoujueBrowse(this)" data-cid="' + card.id + '" style="padding:2px 6px;font-size:12px;opacity:.4" title="编辑口诀">✏️</button>';
        html += '</span></div>';
        html += '<div class="kj-meaning" id="kjb-mean-' + card.id + '">';
        html += '<div style="font-size:12px;color:var(--text-tertiary);margin-bottom:6px">' + escapeHtml(card.question.replace(/^[\d\.\、\s]+/, '')) + '</div>';
        html += parsed.map(p => '<span class="kj-char">' + escapeHtml(p.char) + '</span><span class="kj-desc">（' + escapeHtml(p.desc) + '）</span>').join(' ');
        html += '</div>';
        html += '</div>';
      }
    }
  } else {
    // 普通列表格式
    for (const [chapter, list] of Object.entries(groups)) {
      if (chapter) html += '<div class="section-title" style="margin-top:12px">' + escapeHtml(chapter) + ' · ' + list.length + ' 题</div>';
      for (const card of list) {
        const qText = card.question.replace(/^[\d\.\、\s]+/, '').substring(0, 35);
        html += '<div class="browse-dir-item" onclick="openBrowseDetail(' + card._idx + ')">';
        html += '<span style="font-size:11px;color:var(--text-tertiary);min-width:28px">' + (card._idx + 1) + '</span>';
        html += '<span style="flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml(qText) + '</span>';
        html += '<span style="font-size:20px;flex-shrink:0;cursor:pointer;padding:6px 10px;min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center" onclick="event.stopPropagation();toggleBrowseStarFromList(' + card._idx + ')">' + (card.starred ? '⭐' : '☆') + '</span>';
        html += '</div>';
      }
    }
  }

  c.innerHTML = html;

  // 口诀卡片点击展开事件
  if (st.filter === 'koujue') {
    cards.forEach(card => {
      const el = document.getElementById('kjb-' + card.id);
      const meanEl = document.getElementById('kjb-mean-' + card.id);
      if (el && meanEl) {
        el.onclick = () => {
          const showing = meanEl.classList.contains('show');
          document.querySelectorAll('#browseActive .kj-meaning.show').forEach(m => m.classList.remove('show'));
          if (!showing) meanEl.classList.add('show');
        };
      }
    });
  }
}

function openBrowseDetail(idx) {
  browseState._scrollY = document.getElementById('browseActive').scrollTop || window.scrollY;
  // idx 是全题库索引，映射到筛选后列表的位置
  const filtered = browseState._filteredCards || browseState.cards;
  const fi = filtered.findIndex(c => c._idx === idx);
  browseState.index = fi >= 0 ? fi : 0;
  browseState.view = 'detail';
  renderBrowseDetail();
}

      <div style="margin-bottom:12px;font-weight:500">${escNl(card.question)}</div>

// ==================== 口诀模式 ====================
function renderKoujueStart() {
  const c = $('koujueContainer');
  const banks = Object.values(appData.banks).sort((a, b) => b.createdAt - a.createdAt);

  if (!banks.length) {
    c.innerHTML = `<div class="empty"><span class="icon">💡</span><h3>还没有题库</h3><p>请先导入含口诀的简答题文件</p></div>`;
    return;
  }

  let bankId = sessionStorage.getItem('lastPracticeBank');
  if (!bankId || !appData.banks[bankId]) bankId = banks[0].id;

  let allKjBanks = [];
  for (const b of banks) {
    const kjCards = b.cards.filter(x => x.koujue);
    if (kjCards.length) allKjBanks.push({ bankId: b.id, bankName: b.name, cards: kjCards });
  }

  if (!allKjBanks.length) {
    c.innerHTML = `<div class="empty"><span class="icon">💡</span><h3>当前没有口诀</h3><p>导入含「口诀」格式的简答题文件即可<br>格式：<code>口诀：全（全民化）民（民主化）</code></p></div>`;
    return;
  }

  c.innerHTML = `<div class="flex justify-between items-center mb-16">
    <h1 style="font-size:24px;font-weight:800;letter-spacing:-.02em">口诀背诵</h1>
    <input type="hidden" id="kjBankSelect" value="${bankId}"><button class="btn btn-ghost btn-sm" onclick="showKjBankPicker()" style="font-size:14px;padding:10px 14px;min-width:150px;white-space:nowrap">${escapeHtml(allKjBanks.find(function(b){return b.bankId===bankId})?.bankName || '')} (${(allKjBanks.find(function(b){return b.bankId===bankId})?.cards.length || 0)}条) ▾</button>
  </div>
  <div id="kjCategoryFilter" style="margin-bottom:12px"></div>
  <div id="kjCategoryHint" style="font-size:12px;color:var(--text-tertiary);margin-bottom:12px"></div>
  <div id="kjList"></div>`;

  renderKoujueCards();
}

function getFilteredKjCards(bank) {
  if (!bank || !bank.cards) return [];
  const kjCards = bank.cards.filter(x => x.koujue);
  if (!kjCategoryFilter || !kjCategoryFilter.size) return kjCards;
  return kjCards.filter(c => {
    const q = (c.question || "").trim();
    const matches = q.match(/（[^）]{1,8}）/g) || [];
    return matches.some(m => kjCategoryFilter.has(m));
  });
}

function renderKjCategoryFilter() {
  const div = document.getElementById("kjCategoryFilter");
  if (!div) return;
  const sel = document.getElementById("kjBankSelect");
  if (!sel) return;
  const bank = appData.banks[sel.value];
  if (!bank) { div.innerHTML = ""; return; }
  const cats = extractCategories(bank);
  if (!cats.length) { div.innerHTML = ""; return; }
  if (!kjCategoryFilter) kjCategoryFilter = new Set(cats);
  let h = "<label class=\"form-label\" style=\"font-size:13px\">🏷️ 分类筛选</label><div class=\"chip-group\">";
  h += "<span class=\"chip" + (kjCategoryFilter.size === cats.length ? " active" : "") + "\" onclick=\"toggleAllKjCategories()\">全部</span>";
  for (const cat of cats) {
    h += "<span class=\"chip" + (kjCategoryFilter.has(cat) ? " active" : "") + "\" onclick=\"toggleKjCategory('" + cat + "')\" style=\"margin-left:4px\">" + cat + "</span>";
  }
  h += "</div>";
  div.innerHTML = h;
  updateKjFilteredCount();
}

function toggleAllKjCategories() {
  const sel = document.getElementById("kjBankSelect");
  if (!sel) return;
  const bank = appData.banks[sel.value];
  if (!bank) return;
  const cats = extractCategories(bank);
  if (kjCategoryFilter && kjCategoryFilter.size === cats.length) kjCategoryFilter = new Set();
  else kjCategoryFilter = new Set(cats);
  renderKjCategoryFilter();
  renderKoujueCards();
}

function toggleKjCategory(cat) {
  if (!kjCategoryFilter) return;
  if (kjCategoryFilter.has(cat)) {
    if (kjCategoryFilter.size <= 1) return;
    kjCategoryFilter.delete(cat);
  } else kjCategoryFilter.add(cat);
  renderKjCategoryFilter();
  renderKoujueCards();
}

function updateKjFilteredCount() {
  const sel = document.getElementById("kjBankSelect");
  if (!sel) return;
  const bank = appData.banks[sel.value];
  if (!bank) return;
  const total = bank.cards.filter(x => x.koujue).length;
  const filtered = getFilteredKjCards(bank);
  const hint = document.getElementById("kjCategoryHint");
  if (hint) hint.textContent = "筛选后 " + filtered.length + " / " + total + " 条口诀";
}

function renderKoujueCards() {
  const sel = document.getElementById('kjBankSelect');
  if (!sel) return;
  const bank = appData.banks[sel.value];
  if (!bank) return;
  const cards = getFilteredKjCards(bank);
  renderKjCategoryFilter();
  if (!cards.length) { document.getElementById('kjList').innerHTML = `<div class="empty"><p>该分类下没有口诀</p></div>`; return; }

  const groups = {};
  cards.forEach(card => { const ch = card.chapter || '未分类'; if (!groups[ch]) groups[ch] = []; groups[ch].push(card); });

  let html = '';
  for (const [chapter, list] of Object.entries(groups)) {
    html += `<div class="section"><div class="section-title">${escapeHtml(chapter)} · ${list.length} 条</div>`;
    for (const card of list) {
      const parsed = parseKoujue(card.koujue);
      const keywordsOnly = parsed.map(p => escapeHtml(p.char)).join(' ');
      html += `<div class="kj-card" id="kj-${card.id}">
        <div class="kj-mnemonic">
          ${keywordsOnly || escapeHtml(card.koujue)}
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();editKoujue('${card.id}')" style="padding:2px 6px;font-size:12px;opacity:.4;float:right" title="编辑口诀">✏️</button>
        </div>
        <div class="kj-meaning" id="kj-mean-${card.id}">
          <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:6px">${escapeHtml(card.question.replace(/^[\d\.\、\s]+/, ''))}</div>
          ${parsed.map(p => `<span class="kj-char">${escapeHtml(p.char)}</span><span class="kj-desc">（${escapeHtml(p.desc)}）</span>`).join(' ')}
        </div>
      </div>`;
    }
    html += `</div>`;
  }

  document.getElementById('kjList').innerHTML = html;

  for (const card of cards) {
    const el = document.getElementById('kj-' + card.id);
    const meanEl = document.getElementById('kj-mean-' + card.id);
    if (el && meanEl) {
      el.onclick = () => {
        const showing = meanEl.classList.contains('show');
        document.querySelectorAll('#kjList .kj-meaning.show').forEach(m => m.classList.remove('show'));
        if (!showing) meanEl.classList.add('show');
      };
    }
  }
}

function parseKoujue(kj) {
  if (!kj) return [];
  const result = [];
  const re = /[^\s，,。！!？?、；;：:""''（）()《》—\-]+（[^）]*）/g;
  let m;
  while ((m = re.exec(kj)) !== null) {
    const full = m[0], li = full.lastIndexOf('（');
    if (li > 0) result.push({ char: full.substring(0, li), desc: full.substring(li + 1, full.length - 1) });
  }
  if (!result.length && kj.trim()) result.push({ char: kj.trim(), desc: '' });
  return result;
}

function renderWrongBookStart() {
  const c = $('wrongbookContainer');
  const banks = Object.values(appData.banks).sort((a,b) => b.createdAt - a.createdAt);

  const banksWithWrong = [];
  banks.forEach(b => {
    const wb = getWrongBook(b.id);
    const wrongIds = Object.keys(wb).filter(id => wb[id] && wb[id].wrongIndices && wb[id].wrongIndices.length > 0);
    if (wrongIds.length) banksWithWrong.push({ bank: b, wrongIds, wb });
  });

  if (!banksWithWrong.length) {
    c.innerHTML = '<div class="empty"><span class="icon">❌</span><h3>暂无错题</h3><p>做题时诊断后自动收集错题</p></div>';
    return;
  }

  let currentBankId = sessionStorage.getItem('wrongbookBank');
  if (!currentBankId || !appData.banks[currentBankId] || !Object.keys(getWrongBook(currentBankId)).length) {
    currentBankId = banksWithWrong[0].bank.id;
  }
  let currentData = banksWithWrong.find(b => b.bank.id === currentBankId);
  if (!currentData) currentData = banksWithWrong[0];
  currentBankId = currentData.bank.id;
  sessionStorage.setItem('wrongbookBank', currentBankId);

  const wrongCards = [];
  currentData.wrongIds.forEach(id => {
    const card = currentData.bank.cards.find(x => x.id === id);
    if (card) wrongCards.push({ card, wrongDetail: currentData.wb[id] || {} });
  });

  const groups = {};
  wrongCards.forEach(item => {
    const ch = item.card.chapter || '未分类';
    if (!groups[ch]) groups[ch] = [];
    groups[ch].push(item);
  });

  let html = '<div class="flex justify-between items-center mb-16">';
  html += '<h1 style="font-size:24px;font-weight:800;letter-spacing:-.02em">错题本</h1>';
  html += '<input type="hidden" id="wrongbookBankSelect" value="' + currentBankId + '">';
  var curBankName = currentData ? currentData.bank.name : '选择题库';
  html += '<button class="btn btn-ghost btn-sm" onclick="showBankPicker(document.getElementById(\'wrongbookBankSelect\').value, function(bid){document.getElementById(\'wrongbookBankSelect\').value=bid;sessionStorage.setItem(\'wrongbookBank\',bid);changeWrongBookBank()})" style="font-size:13px">' + escapeHtml(curBankName) + ' (' + currentData.wrongIds.length + '题) ▾</button></div>';

  for (const chapter in groups) {
    html += '<div class="section-title">' + escapeHtml(chapter) + ' · ' + groups[chapter].length + ' 题</div>';
    groups[chapter].forEach(item => {
      const card = item.card;
      html += '<div class="card" style="margin-bottom:10px;padding:14px 16px">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px">';
      html += '<div style="font-weight:500;line-height:1.8;font-size:var(--font-size);flex:1">' + escNl(card.question) + '</div>';
      html += '<button class="btn btn-ghost btn-sm" style="color:var(--danger);flex-shrink:0;font-size:14px;padding:6px 8px;min-height:36px;min-width:36px;align-self:center" data-card-id="' + card.id + '" onclick="removeFromWrongBookPage(this.dataset.cardId)">🗑</button>';
      html += '</div>';
      if (card.koujue) {
        html += '<div style="font-size:12px;color:var(--primary);margin-bottom:4px;font-weight:600;cursor:pointer" onclick="var n=this.nextElementSibling;n.style.display=n.style.display===\'none\'?\'\':\'none\'">💡 口诀（点击查看）</div>';
        html += '<div style="font-size:12px;color:var(--primary);margin-bottom:4px;line-height:1.8;display:none">' + escapeHtml(card.koujue) + '</div>';
      }
      html += renderWrongCardInteractive(card, item.wrongDetail);
      html += '</div>';
    });
  }

  c.innerHTML = html;
}

      <div class="color-dots"><span class="color-dot${(s.color||'teal')==='teal'?' active':''}" style="background:#0891b2" onclick="saveThemeColor('teal')"></span><span class="color-dot${s.color==='purple'?' active':''}" style="background:#9333ea" onclick="saveThemeColor('purple')"></span><span class="color-dot${s.color==='blue'?' active':''}" style="background:#3b82f6" onclick="saveThemeColor('blue')"></span><span class="color-dot${s.color==='rose'?' active':''}" style="background:#e11d48" onclick="saveThemeColor('rose')"></span><span class="color-dot${s.color==='pink'?' active':''}" style="background:#ec4899" onclick="saveThemeColor('pink')"></span><span class="color-dot${s.color==='green'?' active':''}" style="background:#22c55e" onclick="saveThemeColor('green')"></span><span class="color-dot${s.color==='yellow'?' active':''}" style="background:#eab308" onclick="saveThemeColor('yellow')"></span><span class="color-dot${s.color==='cream'?' active':''}" style="background:#c8965c" onclick="saveThemeColor('cream')"></span><span class="color-dot${s.color==='sage'?' active':''}" style="background:#6b9e6b" onclick="saveThemeColor('sage')"></span><span class="color-dot${s.color==='bw'?' active':''}" style="background:#555" onclick="saveThemeColor('bw')"></span></div></div>
    <div class="setting-item"><div><div class="setting-label">字体大小</div><div class="setting-desc" id="fontVal">${s.fontSize}px</div></div>
      <div class="flex items-center gap-8" style="width:140px"><span style="font-size:13px">A</span><input type="range" min="14" max="24" value="${s.fontSize}" step="1" oninput="updateFontSize(parseInt(this.value))" onchange="updateFontSize(parseInt(this.value))"><span style="font-size:18px;font-weight:700">A</span></div></div></div>

  <div class="section"><div class="section-title">关于</div>

    <div class="setting-item" style="cursor:pointer" onclick="showManualMenu()"><div><div class="setting-label">📖 使用说明</div><div class="setting-desc"></div></div><div style="display:flex;align-items:center">→</div></div>
    <div class="setting-item"><div><div class="setting-label">挖空背诵工具 · 小阮出品</div><div class="setting-desc">手机刷题背书工具 · 纯前端离线可用</div></div></div>
    <div class="setting-item" style="cursor:pointer" onclick="clearAllData()"><div><div class="setting-label" style="color:#e91e63">🗑️ 删除所有数据</div><div class="setting-desc">清空全部题库和设置，不可恢复</div></div><div style="display:flex;align-items:center;color:#e91e63">→</div></div>
	    <div class="setting-item" style="cursor:pointer" onclick="checkUpdate()"><div><div class="setting-label">🔄 检查更新</div><div class="setting-desc">点击清除缓存并刷新，获取最新版本</div></div><div style="display:flex;align-items:center">→</div></div></div>`;
  loadVoices();
}

	function checkUpdate() {
  showToast('正在清除缓存...');
  // 清除 Service Worker 缓存
  if ('caches' in window) {
    caches.keys().then(function(names) {
      names.forEach(function(name) { caches.delete(name); });
    });
  }
  // 强制刷新（跳过浏览器缓存）
  setTimeout(function() { location.reload(true); }, 500);
}

function updateDensitySetting(val, el) {
  saveSetting('density', val);
  document.querySelectorAll('#settingsDensity .seg').forEach(s => s.classList.remove('active'));
  if (el) el.classList.add('active');
}

function updateFontSize(val) { appData.settings.fontSize = val; applySettings(); debouncedSaveData(appData); document.getElementById('fontVal').textContent = val + 'px'; }
function updateVoiceRate(val) { appData.settings.voiceRate = val; applySettings(); debouncedSaveData(appData); document.getElementById('rateVal').textContent = val + 'x'; }
function updateVoicePitch(val) { appData.settings.voicePitch = val; applySettings(); debouncedSaveData(appData); document.getElementById('pitchVal').textContent = val + 'x'; }
function updateVoiceName(val) {
  saveSetting('voiceName', val || '');
  document.getElementById('voiceNameVal').textContent = val || '自动选择';
}

function updateReadMode(val) {
  saveSetting('readMode', val);
  document.getElementById('readModeVal').textContent = {once:'仅读一遍',loop:'循环朗读','auto-next':'自动下一题','three-times':'每题三遍'}[val];
}

function isChineseVoice(v) {
  const lang = (v.lang || '').toLowerCase();
  const name = (v.name || '').toLowerCase();
  // 标准中文 lang 标签
  if (lang.startsWith('zh')) return true;
  // ISO 639-3 官话
  if (lang.startsWith('cmn')) return true;
  // 部分引擎（如讯飞）使用 yue 粤语也算中文
  if (lang.startsWith('yue')) return true;
  // 按语音名称匹配：常见中文 TTS 引擎的关键词
  const cnKeywords = ['中文', '普通话', '国语', 'chinese', 'mandarin', 'cantonese', '讯飞', 'xunfei', 'xiaoxiao', 'yunyang', 'hanhan', 'yating', 'zhiwei', 'kangkang', 'yaoyao', '小小', '云希', '晓晓', '云扬'];
  for (var i = 0; i < cnKeywords.length; i++) {
    if (name.indexOf(cnKeywords[i].toLowerCase()) !== -1) return true;
  }
  return false;
}

function loadVoices() {
  if (!window.speechSynthesis) return;
  var voices = window.speechSynthesis.getVoices();
  if (!voices.length) {
    // Chrome 等浏览器异步加载语音列表，监听 voiceschanged 事件
    window.speechSynthesis.onvoiceschanged = function() {
      window.speechSynthesis.onvoiceschanged = null;
      loadVoices();
    };
    // 兜底：200ms 后重试（QQ浏览器可能需要更长时间）
    setTimeout(function() { if (window.speechSynthesis) loadVoices(); }, 500);
    return;
  }
  // 过滤中文语音，兼容各种引擎（系统TTS、讯飞、QQ浏览器等）
  var zhVoices = voices.filter(isChineseVoice);
  _availableVoices = zhVoices.length ? zhVoices : voices;
}

async function makeBackupCode() {
  // 深拷贝并精简：删除可重建的冗余字段，缩小备份码
  const copy = JSON.parse(JSON.stringify(appData));
  for (const b of Object.values(copy.banks || {})) {
    for (const card of b.cards || []) {
      delete card.fullText;       // = question + '\n' + answer，可重建
      delete card._charSelected;  // 编辑中间态，无需备份
      delete card._savedChars;
      delete card._autoBlanks;
    }
  }
  const json = JSON.stringify(copy);
  // deflate-raw 压缩（比 gzip 略小，去掉 gzip 头尾）
  if (typeof CompressionStream !== 'undefined') {
    try {
      const blob = new Blob([json]);
      const cs = new CompressionStream('deflate-raw');
      const stream = blob.stream().pipeThrough(cs);
      const compressed = await new Response(stream).blob();
      const bytes = new Uint8Array(await compressed.arrayBuffer());
      let bin = '';
      for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
      return 'D' + btoa(bin);
    } catch(e) {}
  }
  // 不支持压缩时用原始 base64
  const bytes = new TextEncoder().encode(json);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return 'U' + btoa(bin);
}

async function copyBackup() {
  if (!isPermanentAuth()) { showToast('试用版不支持导出'); return; }
  try {
    showToast('正在生成备份码...');
    const code = await makeBackupCode();
    // 直接复制，不弹窗
    if (navigator.clipboard && navigator.clipboard.writeText) {
      try {
        await navigator.clipboard.writeText(code);
        showToast('✅ 备份码已复制到剪贴板（' + code.length + '字符）');
        return;
      } catch(e) {}
    }
    // 兜底：fallback 到旧版弹窗
    showBackupModal(code);
  } catch(e) { showToast('导出失败'); }
}

function showBackupModal(code) {
  var ov = document.createElement('div'); ov.className = 'modal-overlay'; ov.id = 'backupModal';
  ov.innerHTML = '<div class="modal" style="border-radius:var(--radius);max-width:380px;margin:auto;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:20px">'
    + '<h3 style="margin-bottom:10px">📋 备份码（' + code.length + '字符）</h3>'
    + '<textarea id="backupCodeText" readonly style="width:100%;min-height:80px;font-size:11px;word-break:break-all;padding:10px;border:2px solid var(--border);border-radius:8px;background:var(--bg-input);color:var(--text)">' + code + '</textarea>'
    + '<div class="flex gap-8 mt-12"><button class="btn btn-primary flex-1" onclick="copyBackupCode()">📋 一键复制</button>'
    + '<button class="btn btn-ghost flex-1" onclick="document.getElementById(\'backupModal\').remove()">关闭</button></div>'
    + '</div>';
  document.body.appendChild(ov);
  ov.addEventListener('click', function(e) { if (e.target === ov) ov.remove(); });
}

function copyBackupCode() {
  var ta = document.getElementById('backupCodeText');
  ta.select();
  try {
    document.execCommand('copy');
    showToast('已复制到剪贴板');
  } catch(e) {
    ta.setSelectionRange(0, ta.value.length);
    navigator.clipboard.writeText(ta.value).then(function() {
      showToast('已复制到剪贴板');
    }).catch(function() {
      showToast('复制失败，请长按手动复制');
    });
  }
}

function toggleRestoreSection() {
  const sec = document.getElementById('restoreSection');
  const btn = document.getElementById('restoreToggleBtn');
  if (!sec || !btn) return;
  const showing = sec.style.display !== 'none';
  sec.style.display = showing ? 'none' : 'block';
  if (!showing) {
    // 展开时聚焦输入框
    setTimeout(function() {
      var ta = document.getElementById('restoreTextarea');
      if (ta) ta.focus();
    }, 100);
  }
}

async function doRestore() {
  const code = document.getElementById('restoreTextarea').value.trim();
  if (!code) { showToast('请粘贴备份码'); return; }
  try {
    const prefix = code[0];
    const base64 = code.slice(1);
    const bin = atob(base64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);

    let json;
    if ((prefix === 'Z' || prefix === 'D') && typeof DecompressionStream !== 'undefined') {
      // 压缩的备份码（Z=gzip旧版，D=deflate-raw新版）
      const format = prefix === 'D' ? 'deflate-raw' : 'gzip';
      try {
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream(format));
        json = await new Response(stream).text();
      } catch(e) { json = new TextDecoder().decode(bytes); }
    } else {
      // 未压缩的备份码（兼容旧版）
      json = new TextDecoder().decode(bytes);
    }

    const data = JSON.parse(json);
    if (!data.banks) { showToast('备份码无效'); return; }
    // 恢复后重建 fullText（备份中已精简掉）
    for (const b of Object.values(data.banks || {})) {
      for (const card of b.cards || []) {
        if (!card.fullText) card.fullText = (card.question || '') + '\n' + (card.answer || '');
      }
    }
    appData = data;
    saveData(appData);
    showToast('恢复成功！');
    setTimeout(() => location.reload(), 800);
  } catch(e) { showToast('备份码无效'); }
}

function clearWrongBook() {
  showConfirm('清空错题本', '确定清空所有题库的错题记录吗？', () => {
    appData.wrongBooks = {};
    saveData(appData);
    showToast('错题本已清空');
  });
}

function clearAllData() {
  showConfirm('删除所有数据', '此操作不可撤销！将删除所有题库、设置和进度。', () => {
    appData = { banks: {}, settings: {}, seqProgress: {}, favorites: {}, wrongBooks: {} };
    saveData(appData);
    showToast('已全部删除');
    switchTab('banks');
  });
}
